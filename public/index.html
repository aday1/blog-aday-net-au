<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>blog.aday.net.au</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; margin: 0; padding: 0; background: #0b0b10; color: #e8e8ee; }
    main { max-width: 720px; margin: 80px auto; padding: 0 24px; line-height: 1.6; }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; letter-spacing: -0.01em; }
    code { background: #1a1a22; padding: 2px 6px; border-radius: 4px; font-size: 0.95em; }
    .muted { color: #8a8a9a; font-size: 0.9rem; margin-top: 2rem; }
    a { color: #7aa7ff; }
    ul.links { list-style: none; padding: 0; }
    ul.links li { margin: 0.25rem 0; }
  </style>
</head>
<body>
  <main>
    <h1>blog.aday.net.au</h1>
    <p>Blog at blog.aday.net.au.</p>
    <p>Domain: <code>blog.aday.net.au</code></p>
    <p class="muted" id="deployMetaLine">Deploy metadata loading...</p>
    <div class="muted">
      <ul class="links">
        <li>Live (Cloudflare): <a href="https://blog.aday.net.au">https://blog.aday.net.au</a></li>
        <li>Backup mirror (GitHub Pages): <a href="https://aday1.github.io/blog-aday-net-au/">https://aday1.github.io/blog-aday-net-au/</a></li>
        <li>Source: <a href="https://github.com/aday1/blog-aday-net-au">github.com/aday1/blog-aday-net-au</a></li>
      </ul>
    </div>
  </main>
  <script>
    (function () {
      var line = document.getElementById("deployMetaLine");
      if (!line) return;
      fetch("./deploy-meta.json", { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error("missing")); })
        .then(function (m) {
          var dt = m.build_date ? new Date(m.build_date).toLocaleString() : "unknown-date";
          var track = m.track || m.branch || "unknown-track";
          var version = m.version || "unknown-version";
          line.textContent = "Deploy: " + track + " | " + version + " | " + dt;
        })
        .catch(function () {
          line.textContent = "Deploy metadata unavailable.";
        });
    })();
  </script>
</body>
</html>
